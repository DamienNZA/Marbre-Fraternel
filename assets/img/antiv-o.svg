<svg width="100" height="100" viewBox="-5 0 110 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Le cercle est maintenant bien calé avec une marge latérale de 5 unités -->
  <circle cx="50" cy="50" r="46" stroke="black" stroke-width="7" fill="none" />
  
  <!-- Un V plus imposant pour remplir l'espace -->
  <text x="50" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="black">V</text>
  
  <!-- La barre est un peu plus basse pour ne pas coller au plafond du cercle -->
  <line x1="28" y1="24" x2="72" y2="24" stroke="black" stroke-width="7" stroke-linecap="round" />
</svg>
